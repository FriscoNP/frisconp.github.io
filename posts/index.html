<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Frisco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            }
        }
    </script>
</head>

<body class="flex flex-col min-h-screen bg-white dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300 font-sans">

    <!-- Navigation -->
    <nav class="border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-black sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
            <a href="/" class="text-lg font-semibold text-black dark:text-white">Frisco</a>
            <div class="flex items-center space-x-4">
                <a href="mailto:frisconp.official@gmail.com"
                    class="hidden sm:inline-block px-4 py-1.5 text-xs sm:text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                    Get In Touch
                </a>
                <button id="themeToggle" type="button" aria-pressed="false"
                    class="relative inline-flex items-center justify-center w-8 h-8 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    <svg id="sunIcon" class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
                    </svg>
                    <svg id="moonIcon" class="w-5 h-5 text-gray-600 dark:text-white hidden" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="max-w-3xl mx-auto px-4 sm:px-6 pt-4">
        <nav class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">
            <a href="/" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Home</a>
            <span class="mx-2">/</span>
            <span class="text-gray-700 dark:text-gray-300">Blog</span>
        </nav>
    </div>

    <main class="flex-grow max-w-3xl mx-auto px-4 sm:px-6 py-8 sm:py-16 w-full">
        <h1 class="text-2xl sm:text-3xl font-bold text-black dark:text-white mb-8">All Posts</h1>

        <div class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-4 sm:p-6 text-gray-600 dark:text-gray-400 text-sm text-center">
            <p>No posts yet. Coming soon...</p>
            <a href="/" class="inline-block mt-4 px-4 py-2 text-blue-600 dark:text-blue-400 hover:underline">Back to Home</a>
        </div>
    </main>

    <footer class="mt-12 sm:mt-auto py-6 sm:py-8 text-center text-gray-600 dark:text-gray-400 text-xs sm:text-sm border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-black">
        <p>© 2025 Frisco • Built with Tailwind CSS & AI</p>
        <div class="mt-3 space-x-4 flex justify-center">
            <a href="https://github.com/FriscoNP" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">GitHub</a>
            <a href="https://linkedin.com/in/frisconp" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">LinkedIn</a>
            <a href="mailto:frisconp.official@gmail.com" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Email</a>
        </div>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            html.classList.add('dark');
            themeToggle.setAttribute('aria-pressed', 'true');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.contains('dark');

            if (isDark) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeToggle.setAttribute('aria-pressed', 'false');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.setAttribute('aria-pressed', 'true');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
